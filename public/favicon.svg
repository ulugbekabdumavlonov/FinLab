<svg width="240" height="240" viewBox="0 0 240 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="240" y2="240">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- круг -->
  <circle cx="120" cy="120" r="110" fill="url(#bg)"/>

  <!-- Ф -->
  <text x="72" y="120"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="96"
        font-weight="700"
        fill="white"
        font-family="Inter, system-ui, sans-serif">
    Ф
  </text>

  <!-- линия -->
  <rect x="119" y="65" width="2.5" height="110" rx="2" fill="white" opacity="0.9"/>

  <!-- Л -->
  <text x="168" y="120"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="96"
        font-weight="700"
        fill="white"
        font-family="Inter, system-ui, sans-serif">
    Л
  </text>
</svg>
